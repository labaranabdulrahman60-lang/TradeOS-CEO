<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeOS • CEO Dashboard</title>
    <style>
        :root {
            --bg:#07090d;--surface:#10151d;--surface2:#151b24;--border:rgba(255,255,255,0.06);
            --text:#fff;--text2:#9aa6b2;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6;--cyan:#06b6d4;
            --radius:20px;--gap:20px;--pad:24px;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:var(--pad);-webkit-font-smoothing:antialiased;}
        .container{max-width:1200px;margin:0 auto;}
        header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;flex-wrap:wrap;gap:16px;}
        .greeting .hello{font-size:0.85rem;color:var(--text2);font-weight:500;}.greeting h1{font-size:2rem;font-weight:700;margin-top:4px;letter-spacing:-0.5px;}
        .header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
        .header-actions .btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:12px;font-size:0.8rem;font-weight:600;cursor:pointer;transition:0.2s;}.header-actions .btn:hover{background:var(--surface);}
        .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:var(--gap);margin-bottom:32px;}
        .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:0.3s;}.kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.4);}
        .kpi-card .kpi-icon{font-size:1.2rem;margin-bottom:12px;}.kpi-card .kpi-label{font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}.kpi-card .kpi-value{font-size:1.8rem;font-weight:700;letter-spacing:-0.5px;}.kpi-card .kpi-trend{font-size:0.8rem;margin-top:6px;font-weight:600;}
        .main-grid{display:grid;grid-template-columns:2fr 1fr;gap:var(--gap);margin-bottom:32px;}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;}.card h3{font-size:1rem;font-weight:600;margin-bottom:16px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;}
        .net-worth-center{text-align:center;padding:20px 0;}.net-worth-center .nw-value{font-size:2.5rem;font-weight:700;letter-spacing:-1px;}.net-worth-center .nw-label{font-size:0.8rem;color:var(--text2);margin-top:4px;}.net-worth-center .nw-trend{font-size:0.85rem;font-weight:600;margin-top:4px;}
        .asset-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:16px 0;}.asset-bar .assets{background:var(--green);}.asset-bar .liabilities{background:var(--red);}
        .metric-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:0.85rem;}.metric-row:last-child{border-bottom:none;}.metric-row .mr-label{color:var(--text2);}.metric-row .mr-value{font-weight:600;}
        .insight-card{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}.insight-card .insight-priority{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}.insight-card .insight-text{font-size:0.9rem;line-height:1.5;}.insight-card .insight-action{font-size:0.75rem;color:var(--blue);margin-top:8px;font-weight:600;}
        .product-card,.customer-card{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}.product-card .rank{font-size:0.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;}.product-card .name,.customer-card .name{font-size:1rem;font-weight:600;margin:4px 0;}.product-card .profit{font-size:1.2rem;font-weight:700;color:var(--green);}
        .trend-line{width:100%;height:120px;margin-top:12px;}
        .bottom-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--gap);margin-bottom:32px;}
        .big-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-align:center;}.big-stat .val{font-size:2rem;font-weight:700;letter-spacing:-0.5px;}.big-stat .lbl{font-size:0.75rem;color:var(--text2);margin-top:6px;}
        @media(max-width:768px){.main-grid{grid-template-columns:1fr;}.kpi-grid{grid-template-columns:1fr 1fr;}.greeting h1{font-size:1.5rem;}.kpi-card .kpi-value{font-size:1.4rem;}}
        @media(max-width:480px){.kpi-grid{grid-template-columns:1fr;}.bottom-grid{grid-template-columns:1fr 1fr;}}
    </style>
</head>
<body>
<div class="container" id="app">
    <header>
        <div class="greeting"><div class="hello" id="greetingText">Good Evening</div><h1>CEO Dashboard</h1></div>
        <div class="header-actions"><button class="btn" onclick="window.location.reload()">🔄 Refresh</button><button class="btn" onclick="exportData()">📥 Export</button></div>
    </header>

    <div class="kpi-grid" id="kpiGrid"></div>

    <div class="main-grid">
        <div class="card"><h3>Net Worth Trend</h3><div class="trend-line" id="trendChart"></div></div>
        <div class="card"><h3>Balance Sheet</h3><div id="balanceSheet"></div></div>
    </div>

    <div class="main-grid">
        <div class="card"><h3>📊 Executive Insights</h3><div id="insightsPanel"></div></div>
        <div>
            <div class="card" style="margin-bottom:20px;"><h3>🏆 Best Product</h3><div id="bestProduct"></div></div>
            <div class="card"><h3>👤 Top Customer</h3><div id="topCustomer"></div></div>
        </div>
    </div>

    <div class="bottom-grid" id="bottomStats"></div>
</div>

<script>
const K='tradeos_final_v3';let app={capital:{cash:0,emergencyFund:0,inventoryValue:0,receivables:0,otherAssets:0,payables:0,liabilities:0},capitalHistory:[],decisions:[],inventory:[],deals:[],expenses:[],reviews:[]};
function load(){const r=localStorage.getItem(K);if(r){try{const p=JSON.parse(r);app={...app,...p};if(!app.capital.otherAssets)app.capital.otherAssets=0;if(!app.capital.liabilities)app.capital.liabilities=0;if(!app.capitalHistory)app.capitalHistory=[];}catch(e){}}}
function ta(){const c=app.capital;return c.cash+c.emergencyFund+c.inventoryValue+c.receivables+(c.otherAssets||0);}
function tl(){const c=app.capital;return c.payables+(c.liabilities||0);}
function nw(){return ta()-tl();}
function fm(n){return'₦'+Number(n).toLocaleString();}
function exportData(){const b=new Blob([JSON.stringify(app)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='tradeos_ceo_'+new Date().toISOString().slice(0,10)+'.json';a.click();}

function render(){
    const now=new Date();const tm=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    const closed=app.deals.filter(d=>d.status==='Closed');const mDeals=closed.filter(d=>d.date&&d.date.startsWith(tm));
    const mRev=mDeals.reduce((s,d)=>s+(d.profit||0),0);const mExp=app.expenses.filter(e=>e.date&&e.date.startsWith(tm)).reduce((s,e)=>s+e.amount,0);
    const net=nw();const totalProfit=closed.reduce((s,d)=>s+(d.profit||0),0);
    const prods={};closed.forEach(d=>{const k=d.product||'Other';prods[k]=(prods[k]||0)+(d.profit||0);});
    const bestP=Object.entries(prods).sort((a,b)=>b[1]-a[1])[0];
    const custs={};closed.forEach(d=>{const k=d.customer||'Other';custs[k]=(custs[k]||0)+1;});
    const bestC=Object.entries(custs).sort((a,b)=>b[1]-a[1])[0];
    const soldInv=app.inventory.filter(i=>i.status==='Sold');const avgHold=soldInv.length?Math.round(soldInv.reduce((s,i)=>{const pd=new Date(i.purchaseDate||i.date);const sd=new Date(i.date);return s+(sd-pd)/86400000;},0)/soldInv.length):0;
    const decs=app.decisions.filter(d=>d.status!=='pending');const appr=decs.filter(d=>d.status==='approved').length;const dwr=decs.length?Math.round(appr/decs.length*100):0;
    const monthlyROI=mExp>0?Math.round((mRev-mExp)/mExp*100):0;const cashRunway=mExp>0&&app.capital.cash>0?Math.round(app.capital.cash/(mExp/30)):0;
    const hour=new Date().getHours();const greet=hour<12?'Good Morning':hour<17?'Good Afternoon':'Good Evening';document.getElementById('greetingText').textContent=greet;

    // KPI Cards
    document.getElementById('kpiGrid').innerHTML=[
        {icon:'💰',label:'Revenue',value:'+'+fm(mRev),trend:'This Month',color:'var(--green)'},
        {icon:'📉',label:'Expenses',value:'-'+fm(mExp),trend:'This Month',color:'var(--red)'},
        {icon:'📊',label:'Net Profit',value:(mRev-mExp>=0?'+':'')+fm(mRev-mExp),trend:monthlyROI+'% ROI',color:mRev-mExp>=0?'var(--green)':'var(--red)'},
        {icon:'🏦',label:'Net Worth',value:fm(net),trend:net>=0?'Positive':'Negative',color:net>=0?'var(--green)':'var(--red)'}
    ].map(k=>'<div class="kpi-card"><div class="kpi-icon">'+k.icon+'</div><div class="kpi-label">'+k.label+'</div><div class="kpi-value" style="color:'+k.color+'">'+k.value+'</div><div class="kpi-trend" style="color:'+k.color+'">'+k.trend+'</div></div>').join('');

    // Trend Chart
    const ch=app.capitalHistory||[];
    if(ch.length>1){const mx=Math.max(...ch.map(h=>h.netWorth),1);const mn=Math.min(...ch.map(h=>h.netWorth),0);let pts='';ch.forEach((h,i)=>{const x=Math.round((i/((ch.length-1)||1))*100);const y=100-Math.round(((h.netWorth-mn)/((mx-mn)||1))*100);pts+=x+','+y+' ';});document.getElementById('trendChart').innerHTML='<svg viewBox="0 0 100 100" style="width:100%;height:100%;"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--green)" stop-opacity="0.3"/><stop offset="100%" stop-color="var(--green)" stop-opacity="0"/></linearGradient></defs><polyline points="'+pts.trim()+'" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round"/></svg>';}else{document.getElementById('trendChart').innerHTML='<p style="color:var(--text2);text-align:center;padding-top:40px;">Log data in TradeOS to see your trend</p>';}

    // Balance Sheet
    const tta=ta();const ttl=tl();const assetPct=tta>0?Math.round((tta/(tta+ttl||1))*100):50;
    document.getElementById('balanceSheet').innerHTML='<div class="net-worth-center"><div class="nw-value" style="color:'+(net>=0?'var(--green)':'var(--red)')+'">'+fm(net)+'</div><div class="nw-label">Net Worth</div></div><div class="asset-bar"><div class="assets" style="width:'+assetPct+'%;"></div><div class="liabilities" style="width:'+(100-assetPct)+'%;"></div></div><div class="metric-row"><span class="mr-label">Assets</span><span class="mr-value" style="color:var(--green)">'+fm(tta)+'</span></div><div class="metric-row"><span class="mr-label">Liabilities</span><span class="mr-value" style="color:var(--red)">'+fm(ttl)+'</span></div><div class="metric-row"><span class="mr-label">Cash</span><span class="mr-value">'+fm(app.capital.cash)+'</span></div><div class="metric-row"><span class="mr-label">Emergency Fund</span><span class="mr-value">'+fm(app.capital.emergencyFund)+'</span></div><div class="metric-row"><span class="mr-label">Cash Runway</span><span class="mr-value">'+cashRunway+' days</span></div>';

    // Insights
    let insights=[];
    if(app.capital.emergencyFund<=0)insights.push({p:'🔴 Critical',c:'var(--red)',t:'No emergency fund. You are one unexpected expense away from crisis.',a:'Save ₦5,000 this week.'});
    if(mExp>mRev&&mRev>0)insights.push({p:'🔴 Warning',c:'var(--red)',t:'Expenses exceeded revenue this month.',a:'Review your Costs tab and cut one category.'});
    if(avgHold>14)insights.push({p:'🟡 Watch',c:'var(--amber)',t:'Inventory holding time is '+avgHold+' days — above the healthy range.',a:'Consider discounting slow-moving stock.'});
    if(bestC&&custs[bestC[0]]>=3)insights.push({p:'🔵 Note',c:'var(--cyan)',t:bestC[0]+' is your top customer with '+bestC[1]+' purchases.',a:'Offer them a loyalty discount.'});
    if(dwr>=70)insights.push({p:'🟢 Positive',c:'var(--green)',t:'Decision win rate is '+dwr+'%. You are making good choices.',a:'Keep using the Decision Engine before every purchase.'});
    if(!insights.length)insights.push({p:'📋 Info',c:'var(--text2)',t:'Log more data in TradeOS to generate insights.',a:'Start by logging deals and expenses.'});
    document.getElementById('insightsPanel').innerHTML=insights.map(i=>'<div class="insight-card"><div class="insight-priority" style="color:'+i.c+'">'+i.p+'</div><div class="insight-text">'+i.t+'</div><div class="insight-action">→ '+i.a+'</div></div>').join('');

    // Best Product
    document.getElementById('bestProduct').innerHTML=bestP?'<div class="product-card"><div class="rank">#1 Bestseller</div><div class="name">'+bestP[0]+'</div><div class="profit">+'+fm(bestP[1])+' profit</div></div>':'<p style="color:var(--text2);">No sales yet</p>';

    // Top Customer
    document.getElementById('topCustomer').innerHTML=bestC?'<div class="customer-card"><div class="rank">Top Customer</div><div class="name">'+bestC[0]+'</div><div style="font-size:0.85rem;color:var(--text2);">'+bestC[1]+' purchase(s)</div></div>':'<p style="color:var(--text2);">No customers yet</p>';

    // Bottom Stats
    document.getElementById('bottomStats').innerHTML=[
        {v:fm(totalProfit),l:'Lifetime Profit',c:'var(--green)'},{v:closed.length,l:'Total Deals',c:'var(--text)'},
        {v:app.inventory.length,l:'Products',c:'var(--text)'},{v:app.reviews.length,l:'Reviews',c:'var(--text)'},
        {v:dwr+'%',l:'Decision Win Rate',c:'var(--blue)'},{v:avgHold||'-',l:'Avg Hold (Days)',c:'var(--amber)'},
        {v:monthlyROI+'%',l:'Monthly ROI',c:'var(--green)'},{v:cashRunway,l:'Cash Runway',c:'var(--purple)'}
    ].map(s=>'<div class="big-stat"><div class="val" style="color:'+s.c+'">'+s.v+'</div><div class="lbl">'+s.l+'</div></div>').join('');
}
load();render();
</script>
</body>
</html>
